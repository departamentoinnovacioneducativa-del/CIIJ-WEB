<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matemágicas - Tu Guía Definitiva</title>
    <style>
        /* ==========================================================================
           ESTILOS Y DISEÑO
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@300;700&display=swap');

        :root {
            --deep: #010403;
            --tech: #00FF9D;
            --silver: #E0E2E1;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --shadow-glow: 0 0 20px rgba(0, 255, 157, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--deep); 
            color: var(--silver); 
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        #matrixCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.15;
        }

        .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
        .text-center { text-align: center; }

        /* Estructura */
        .top-brand-banner { padding: 40px 0; border-bottom: 1px solid var(--border); background: rgba(1, 4, 3, 0.8); }
        .video-wrapper-main { width: 100%; max-width: 600px; aspect-ratio: 16 / 9; margin: 0 auto 20px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-glow); }
        .video-wrapper-main div { width: 100%; height: 100%; }

        .btn-tech { 
            display: inline-block; padding: 12px 25px; margin: 10px;
            text-transform: uppercase; font-weight: 700; letter-spacing: 2px;
            cursor: pointer; border-radius: 4px; text-decoration: none;
            transition: 0.3s; font-size: 0.8rem;
        }
        .btn-primary { background: var(--tech); color: var(--deep); border: none; }
        .btn-secondary { background: transparent; border: 1px solid var(--tech); color: var(--tech); }
        .btn-tech:hover { transform: translateY(-3px); box-shadow: var(--shadow-glow); }

        .ciij-title { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; font-weight: 700; color: #fff; margin-top: 20px; text-shadow: var(--shadow-glow); }
        .institutional-badge { color: var(--tech); font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
        
        footer { padding: 50px 0; text-align: center; }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="top-brand-banner text-center">
        <div class="container">
            <div class="video-wrapper-main">
                <div id="yt-reproductor"></div>
            </div>
            <div>
                <button id="btnAudioToggle" class="btn-tech btn-secondary">Activar Sonido</button>
                <a href="https://youtu.be/ehpMdEBZxLw?si=5rWNjLRDTX8bitI3" target="_blank" class="btn-tech btn-primary">Ir al Video</a>
            </div>
            <div class="ciij-title">MATEMÁGICAS</div>
            <div class="institutional-badge">Tu Guía del Instituto Juventud del Estado de México</div>
        </div>
    </div>

    <footer>
        <a href="Cursos de capacitación.html" class="btn-tech btn-primary">Regresar</a>
    </footer>

    <script>
        // 1. Efecto Matrix
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const columns = canvas.width / 20;
        const drops = Array(Math.floor(columns)).fill(1);
        
        function draw() {
            ctx.fillStyle = 'rgba(1, 4, 3, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00FF9D';
            ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                const text = String.fromCharCode(48 + Math.random() * 10);
                ctx.fillText(text, i * 20, y);
                drops[i] = y > canvas.height ? 0 : y + 20;
            });
        }
        setInterval(draw, 50);

        // 2. Reproductor de YouTube
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-reproductor', {
                videoId: 'pDaFh9pFGj8',
                playerVars: { 
                    'autoplay': 1, 
                    'loop': 1, 
                    'playlist': 'pDaFh9pFGj8', 
                    'mute': 1, 
                    'controls': 0 
                },
                events: { 
                    'onReady': (event) => {
                        const btn = document.getElementById('btnAudioToggle');
                        btn.onclick = () => {
                            if (player.isMuted()) {
                                player.unMute();
                                btn.innerText = "Silenciar";
                            } else {
                                player.mute();
                                btn.innerText = "Activar Sonido";
                            }
                        };
                    }
                }
            });
        }
    </script>
</body>
</html>
